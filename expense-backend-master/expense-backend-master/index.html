<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container-fluid">
            <div class="row align-items-center">
                <div class="col-3">
                    <div class="d-flex align-items-center">
                        <span class="time">11:00</span>
                        <div class="status-icons ms-2">
                            <i class="fas fa-shield-alt"></i>
                            <i class="fas fa-battery-three-quarters ms-1"></i>
                        </div>
                    </div>
                </div>
                <div class="col-6 text-center">
                    <div class="d-flex align-items-center justify-content-center">
                        <button class="btn btn-link menu-btn" id="menuBtn">
                            <i class="fas fa-bars"></i>
                        </button>
                        <h1 class="app-title mb-0">Expense Tracker</h1>
                    </div>
                </div>
                <div class="col-3 text-end">
                    <span class="debug-flag">DEBUG</span>
                    <i class="fas fa-signal ms-1"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <!-- Login/Register Section -->
            <div id="authSection" class="auth-section">
                <div class="card">
                    <div class="card-body">
                        <h3 class="text-center mb-4">Welcome to Expense Tracker</h3>
                        
                        <!-- Login Form -->
                        <form id="loginForm" class="auth-form">
                            <h5>Login</h5>
                            <div class="mb-3">
                                <input type="text" class="form-control" id="loginUsername" placeholder="Username" required>
                            </div>
                            <div class="mb-3">
                                <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                        </form>

                        <hr class="my-4">

                        <!-- Register Form -->
                        <form id="registerForm" class="auth-form">
                            <h5>Register</h5>
                            <div class="mb-3">
                                <input type="text" class="form-control" id="registerName" placeholder="Full Name" required>
                            </div>
                            <div class="mb-3">
                                <input type="text" class="form-control" id="registerUsername" placeholder="Username" required>
                            </div>
                            <div class="mb-3">
                                <input type="password" class="form-control" id="registerPassword" placeholder="Password" required>
                            </div>
                            <div class="mb-3">
                                <input type="number" class="form-control" id="registerBalance" placeholder="Initial Balance" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Register</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Dashboard Section -->
            <div id="dashboardSection" class="dashboard-section" style="display: none;">
                <!-- User Info -->
                <div class="user-info mb-4">
                    <h4>Welcome, <span id="userName">User</span>!</h4>
                    <p class="text-muted">Current Balance: ₹<span id="userBalance">0</span></p>
                </div>

                <!-- Expense Usage Section -->
                <div class="expense-usage-section mb-4">
                    <h5>Expense Usage</h5>
                    <div class="progress-container">
                        <div class="progress">
                            <div class="progress-bar bg-danger" id="expenseProgress" role="progressbar" style="width: 60%">
                                60.0%
                            </div>
                        </div>
                        <div class="progress-labels">
                            <span>0%</span>
                            <span>100%</span>
                        </div>
                    </div>
                    
                    <div class="expense-input-section mt-3">
                        <div class="input-group">
                            <input type="number" class="form-control expense-input" id="expenseAmount" placeholder="100" value="100">
                            <select class="form-select" id="expenseCategory">
                                <option value="">Select Category</option>
                            </select>
                        </div>
                        <div class="mt-2">
                            <input type="text" class="form-control" id="expenseDescription" placeholder="Description (optional)">
                        </div>
                        <button class="btn btn-success submit-btn w-100 mt-3" id="submitExpense">
                            <i class="fas fa-plus"></i> Submit
                        </button>
                    </div>
                </div>

                <!-- Income Section -->
                <div class="income-section mb-4" id="incomeSection" style="display: none;">
                    <h5>Add Income</h5>
                    <div class="input-group">
                        <input type="number" class="form-control" id="incomeAmount" placeholder="Amount">
                        <select class="form-select" id="incomeCategory">
                            <option value="">Select Category</option>
                        </select>
                    </div>
                    <div class="mt-2">
                        <input type="text" class="form-control" id="incomeDescription" placeholder="Description (optional)">
                    </div>
                    <button class="btn btn-primary w-100 mt-3" id="submitIncome">
                        <i class="fas fa-plus"></i> Add Income
                    </button>
                </div>

                <!-- Expense History Section -->
                <div class="expense-history-section">
                    <h5>Expense History</h5>
                    <div id="expenseHistory" class="expense-cards">
                        <!-- Expense cards will be populated here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav" id="bottomNav" style="display: none;">
        <div class="nav-item active" data-tab="expense">
            <i class="fas fa-chart-line"></i>
            <span>Expense</span>
        </div>
        <div class="nav-item" data-tab="income">
            <i class="fas fa-dollar-sign"></i>
            <span>Income</span>
        </div>
    </nav>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner" style="display: none;">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toast" class="toast" role="alert">
            <div class="toast-header">
                <strong class="me-auto">Notification</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
