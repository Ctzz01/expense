<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manage Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="gradient-bg"></div>
    <nav class="navbar navbar-expand-lg navbar-light py-3">
      <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold m-0" href="index.html">
          <i class="bi bi-sliders me-2"></i>
          Manage Categories
        </a>
        <div class="d-flex gap-2">
          <a class="btn btn-sm btn-outline-dark" href="index.html"><i class="bi bi-cash-coin"></i></a>
          <a class="btn btn-sm btn-outline-dark" href="income.html"><i class="bi bi-coin"></i></a>
        </div>
      </div>
    </nav>

    <main class="container my-4 my-md-5">
      <div class="row g-4">
        <div class="col-12 col-lg-6">
          <div class="card glass shadow-lg">
            <div class="card-body p-3 p-md-4">
              <h2 class="h6 mb-3"><i class="bi bi-bag me-2"></i>Expense Categories</h2>
              <form id="expCatForm" class="row g-2 mb-3">
                <div class="col">
                  <input id="expCatName" class="form-control" placeholder="New expense category" />
                </div>
                <div class="col-auto">
                  <button class="btn btn-primary" type="submit"><i class="bi bi-plus-lg me-1"></i>Add</button>
                </div>
              </form>
              <div id="expCatChips" class="d-flex flex-wrap gap-2"></div>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <div class="card glass shadow-lg">
            <div class="card-body p-3 p-md-4">
              <h2 class="h6 mb-3"><i class="bi bi-cash-stack me-2"></i>Income Categories</h2>
              <form id="incCatForm" class="row g-2 mb-3">
                <div class="col">
                  <input id="incCatName" class="form-control" placeholder="New income category" />
                </div>
                <div class="col-auto">
                  <button class="btn btn-primary" type="submit"><i class="bi bi-plus-lg me-1"></i>Add</button>
                </div>
              </form>
              <div id="incCatChips" class="d-flex flex-wrap gap-2"></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div class="bottom-toggle">
      <div class="container d-flex gap-2">
        <a href="index.html" class="btn btn-outline-dark flex-fill"><i class="bi bi-cash-coin me-1"></i>Expenses</a>
        <a href="income.html" class="btn btn-outline-dark flex-fill"><i class="bi bi-coin me-1"></i>Income</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/script.js"></script>
  </body>
  </html>
