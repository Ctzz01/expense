version: "3.8"

services:
  eureka-server:
    container_name: eureka-server
    build:
      context: ../service-registry-master/service-registry-master
    ports:
      - "8761:8761"
    environment:
      LOGGING_LEVEL_COM_NETFLIX_EUREKA: INFO
      LOGGING_LEVEL_COM_NETFLIX_DISCOVERY: INFO
      LOGGING_LEVEL_ROOT: INFO
    networks:
      - expense-network

  mysql:
    image: mysql:8.0
    container_name: expense-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - expense-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD" ]
      interval: 10s
      timeout: 5s
      retries: 5


  expense-service:
    build: ../expense-backend-master/expense-backend-master
    container_name: expense-service
    restart: always
    depends_on:
      - mysql
      - eureka-server
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: EXPENSE-SERVICE
      SERVER_PORT: 8080

      # 🔴 IMPORTANT CHANGE: localhost → mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/expense_db?serverTimezone=Asia/Kolkata
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver

      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQL8Dialect

      SPRING_JACKSON_SERIALIZATION_FAIL_ON_EMPTY_BEANS: "false"
      SPRING_MVC_PATHMATCH_MATCHING_STRATEGY: ANT_PATH_MATCHER
      SPRING_MVC_WELCOME_PAGE_ENABLED: "false"
    networks:
      - expense-network

  report-service:
    build: ../report-service-master/report-service-master
    container_name: report-service
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/report_service?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver

      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQL8Dialect

      SPRING_JACKSON_SERIALIZATION_FAIL_ON_EMPTY_BEANS: "false"
      SPRING_MVC_PATHMATCH_MATCHING_STRATEGY: ANT_PATH_MATCHER
      SPRING_MVC_WELCOME_PAGE_ENABLED: "false"
    networks:
      - expense-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
     ZOOKEEPER_CLIENT_PORT: 2181
     ZOOKEEPER_TICK_TIME: 2000
    ports:
     - "2181:2181"
    networks:
     - expense-network

  kafka:
   image: confluentinc/cp-kafka:7.6.0
   container_name: kafka
   restart: always
   depends_on:
    - zookeeper
   ports:
     - "9092:9092"
   environment:
     KAFKA_BROKER_ID: 1
     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
     KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
     KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
   networks:
     - expense-network



volumes:
  mysql_data:

networks:
  expense-network:
