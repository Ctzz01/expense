<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Expense Tracker</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div class="gradient-bg"></div>

    <nav class="navbar navbar-expand-lg navbar-light py-3">
      <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold m-0" href="#">
          <i class="bi bi-wallet2 me-2"></i>
          Expense Tracker
        </a>
        <a class="btn btn-sm btn-outline-dark menu-categories-link" href="categories.html" title="Manage Categories">
          <i class="bi bi-list"></i>
        </a>
      </div>
    </nav>

    <main class="container my-4 my-md-5">
      <div class="row g-4">
        <!-- Summary Card -->
        <div class="col-12">
          <div class="card glass shadow-lg">
            <div class="card-body p-3 p-md-4">
              <div class="row g-3 align-items-end">
                <div class="col-12">
                  <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="fw-semibold">Remaining Balance</div>
                    <div class="small text-secondary" id="remainingPercentLabel">0%</div>
                  </div>
                  <div class="progress progress-lg">
                    <div
                      id="progressBar"
                      class="progress-bar progress-bar-striped progress-bar-animated"
                      role="progressbar"
                      style="width: 0%"
                      aria-valuemin="0"
                      aria-valuemax="100"
                      aria-valuenow="0"
                    ></div>
                  </div>
                  <div class="row text-center mt-3 g-2">
                    <div class="col-4">
                      <div class="metric">
                        <div class="label">Total Income</div>
                        <div id="budgetDisplay" class="value">$0.00</div>
                      </div>
                    </div>
                    <div class="col-4">
                      <div class="metric">
                        <div class="label">Spent</div>
                        <div id="spentDisplay" class="value">$0.00</div>
                      </div>
                    </div>
                    <div class="col-4">
                      <div class="metric">
                        <div class="label">Remaining</div>
                        <div id="remainingDisplay" class="value">$0.00</div>
                      </div>
                    </div>
                  </div>
                  <div id="overBudgetAlert" class="alert alert-danger d-none mt-3 py-2 px-3" role="alert">
                    <i class="bi bi-exclamation-triangle me-1"></i>
                    Over budget by <span id="overBudgetAmount">$0.00</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Add Expense Card -->
        <div class="col-12">
          <div class="card glass shadow-lg float-in">
            <div class="card-body p-3 p-md-4">
              <h2 class="h5 mb-3 mb-md-4"><i class="bi bi-plus-circle me-2"></i>Add Daily Expense</h2>
              <form id="expenseForm" class="row g-3 g-md-4">
                <div class="col-6 col-md-3">
                  <label for="dateInput" class="form-label">Date</label>
                  <input type="date" class="form-control" id="dateInput" required />
                </div>
                <div class="col-6 col-md-3">
                  <label for="categoryInput" class="form-label">Category</label>
                  <select id="categoryInput" class="form-select" required>
                    <option value="" disabled selected>Choose...</option>
                    <option>Food</option>
                    <option>Transport</option>
                    <option>Entertainment</option>
                    <option>Bills</option>
                    <option>Shopping</option>
                    <option>Health</option>
                    <option>Education</option>
                    <option>Other</option>
                  </select>
                </div>
                <div class="col-12 col-md-4">
                  <label for="descriptionInput" class="form-label">Description (optional)</label>
                  <input type="text" class="form-control" id="descriptionInput" placeholder="e.g., Lunch, Uber, Netflix" />
                </div>
                <div class="col-12 col-md-2">
                  <label for="amountInput" class="form-label">Amount</label>
                  <div class="input-group">
                    <span class="input-group-text" id="currencySymbolSpan2">₹</span>
                    <input type="number" class="form-control" id="amountInput" min="0" step="0.01" required />
                  </div>
                </div>
                <div class="col-12 d-flex gap-2">
                  <button class="btn btn-success" type="submit">
                    <i class="bi bi-plus-lg me-1"></i>Add Expense
                  </button>
                  <button class="btn btn-outline-secondary" type="reset">
                    <i class="bi bi-arrow-counterclockwise me-1"></i>Reset
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- Categories & History Card with Tabs -->
        <div class="col-12">
          <div class="card glass shadow-lg">
            <div class="card-body p-3 p-md-4">
              <ul class="nav nav-pills gap-2 mb-3" role="tablist">
                <li class="nav-item" role="presentation">
                  <button class="nav-link active" id="tab-categories-tab" data-bs-toggle="tab" data-bs-target="#tab-categories" type="button" role="tab" aria-controls="tab-categories" aria-selected="true">
                    <i class="bi bi-pie-chart me-1"></i>Categories
                  </button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="tab-history-tab" data-bs-toggle="tab" data-bs-target="#tab-history" type="button" role="tab" aria-controls="tab-history" aria-selected="false">
                    <i class="bi bi-clock-history me-1"></i>All History
                  </button>
                </li>
              </ul>

                  <div class="tab-content">
                <!-- Categories breakdown (default) -->
                <div class="tab-pane fade show active" id="tab-categories" role="tabpanel" aria-labelledby="tab-categories-tab">
                  <div class="d-flex justify-content-end mb-2">
                    <button id="expCatDateFilterBtn" class="btn btn-sm btn-outline-secondary" type="button" title="Date filters">
                      <i class="bi bi-sliders"></i>
                    </button>
                  </div>
                  <div id="expCatDateFilterPanel" class="row g-2 align-items-end mb-3 d-none">
                    <div class="col-12 col-md-3">
                      <label for="expCatDateFilterSelect" class="form-label">Date range</label>
                      <select id="expCatDateFilterSelect" class="form-select form-select-sm">
                        <option value="today">Today</option>
                        <option value="week">This Week</option>
                        <option value="month" selected>This Month</option>
                        <option value="year">This Year</option>
                        <option value="custom">Custom</option>
                      </select>
                    </div>
                    <div class="col-6 col-md-2 exp-cat-custom d-none">
                      <label for="expCatDateFrom" class="form-label">From</label>
                      <input type="date" id="expCatDateFrom" class="form-control form-control-sm" />
                    </div>
                    <div class="col-6 col-md-2 exp-cat-custom d-none">
                      <label for="expCatDateTo" class="form-label">To</label>
                      <input type="date" id="expCatDateTo" class="form-control form-control-sm" />
                    </div>
                  </div>
                  <div id="categoryBreakdown" class="category-grid">
                    <!-- category tiles injected dynamically -->
                  </div>
                </div>

                <!-- All history table -->
                <div class="tab-pane fade" id="tab-history" role="tabpanel" aria-labelledby="tab-history-tab">
                  <div class="d-flex flex-column flex-md-row gap-2 gap-md-3 align-items-md-center justify-content-between mb-2 mb-md-3">
                    <div class="d-flex align-items-center gap-2">
                      <h2 class="h6 m-0"><i class="bi bi-clock-history me-2"></i>Expense History</h2>
                      <button id="expDateFilterBtn" class="btn btn-sm btn-outline-secondary" type="button" title="Date filters">
                        <i class="bi bi-sliders"></i>
                      </button>
                    </div>
                    <div class="d-flex flex-wrap gap-2">
                      <select id="filterCategory" class="form-select">
                        <option value="ALL">All Categories</option>
                        <option>Food</option>
                        <option>Transport</option>
                        <option>Entertainment</option>
                        <option>Bills</option>
                        <option>Shopping</option>
                        <option>Health</option>
                        <option>Education</option>
                        <option>Other</option>
                      </select>
                      <select id="sortBy" class="form-select">
                        <option value="date_desc">Sort: Date (newest)</option>
                        <option value="date_asc">Sort: Date (oldest)</option>
                        <option value="amount_desc">Sort: Amount (high → low)</option>
                        <option value="amount_asc">Sort: Amount (low → high)</option>
                        <option value="category_asc">Sort: Category (A → Z)</option>
                        <option value="category_desc">Sort: Category (Z → A)</option>
                      </select>
                      <button id="resetAllBtn" class="btn btn-danger">
                        <i class="bi bi-trash2-fill me-1"></i>Reset All
                      </button>
                      <button id="clearAllBtn" class="btn btn-outline-danger">
                        <i class="bi bi-trash3 me-1"></i>Clear All
                      </button>
                    </div>
                  </div>

                  <!-- Date filter panel (hidden until toggled) -->
                  <div id="expDateFilterPanel" class="row g-2 align-items-end mb-3 d-none">
                    <div class="col-12 col-md-3">
                      <label for="expDateFilterSelect" class="form-label">Date range</label>
                      <select id="expDateFilterSelect" class="form-select form-select-sm">
                        <option value="today">Today</option>
                        <option value="week">This Week</option>
                        <option value="month">This Month</option>
                        <option value="year">This Year</option>
                        <option value="custom">Custom</option>
                      </select>
                    </div>
                    <div class="col-6 col-md-2 exp-custom d-none">
                      <label for="expDateFrom" class="form-label">From</label>
                      <input type="date" id="expDateFrom" class="form-control form-control-sm" />
                    </div>
                    <div class="col-6 col-md-2 exp-custom d-none">
                      <label for="expDateTo" class="form-label">To</label>
                      <input type="date" id="expDateTo" class="form-control form-control-sm" />
                    </div>
                  </div>

                  <div class="table-responsive">
                    <table class="table align-middle table-hover mb-0">
                      <thead>
                        <tr>
                          <th scope="col">Date</th>
                          <th scope="col">Category</th>
                          <th scope="col">Description</th>
                          <th scope="col" class="text-end">Amount</th>
                          <th scope="col" class="text-end">Actions</th>
                        </tr>
                      </thead>
                      <tbody id="historyBody">
                        <!-- rows injected dynamically -->
                      </tbody>
                    </table>
                  </div>

                  <div id="emptyState" class="text-center text-secondary py-4 d-none">
                    <i class="bi bi-journal-x display-6 d-block mb-2 opacity-50"></i>
                    <div>No expenses yet. Add your first one above.</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Bottom toggle bar -->
    <div class="bottom-toggle">
      <div class="container d-flex gap-2">
        <a href="index.html" class="btn btn-dark flex-fill active"><i class="bi bi-cash-coin me-1"></i>Expenses</a>
        <a href="income.html" class="btn btn-outline-dark flex-fill"><i class="bi bi-coin me-1"></i>Income</a>
      </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>

    <script src="./assets/script.js"></script>
  </body>
  </html>
